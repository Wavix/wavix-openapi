api:
  specs:
    - openapi: ../docs/wavix-api.yaml
default-group: local
groups:
  local:
    generators:
      - name: fern-typescript-sdk
        version: &typescript-version 3.72.3
        output:
          location: local-file-system
          path: ../sdks/typescript
      - name: fern-ruby-sdk
        version: &ruby-version 1.13.1
        output:
          location: local-file-system
          path: ../sdks/ruby
      - name: fern-python-sdk
        version: &python-version 5.14.18
        output:
          location: local-file-system
          path: ../sdks/python
      - name: fern-go-sdk
        version: &go-version 1.45.4
        output:
          location: local-file-system
          path: ../sdks/go
  publish:
    generators:
      - &typescript-sdk
        name: fern-typescript-sdk
        version: *typescript-version
        output:
          location: npm
          package-name: "@wavix/sdk"
          token: OIDC
        config:
          namespaceExport: Wavix
        github:
          repository: wavix/wavix-typescript
          mode: pull-request
      - &ruby-sdk
        name: fern-ruby-sdk
        version: *ruby-version
        output:
          location: rubygems
          package-name: wavix
          api-key: ${RUBYGEMS_API_KEY}
        github:
          repository: wavix/wavix-ruby
          mode: pull-request
      - &python-sdk
        name: fern-python-sdk
        version: *python-version
        output:
          location: pypi
          package-name: wavix
          token: OIDC
        config:
          client_class_name: Wavix
        github:
          repository: wavix/wavix-python
          mode: pull-request
      - &go-sdk
        name: fern-go-sdk
        version: *go-version
        github:
          repository: wavix/wavix-go
          mode: pull-request
        config:
          module:
            path: github.com/wavix/wavix-go
  typescript-sdk:
    generators:
      - *typescript-sdk
  ruby-sdk:
    generators:
      - *ruby-sdk
  python-sdk:
    generators:
      - *python-sdk
  go-sdk:
    generators:
      - *go-sdk
